name: Patch Assets
on: [push]
jobs:
  patch:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace ytl_icon
        run: |
          pip3 install Pillow lzfse --break-system-packages --quiet
          python3 << 'EOF'
          import struct, lzfse
          from PIL import Image, ImageDraw

          with open('Assets.car', 'rb') as f:
              car = bytearray(f.read())

          img = Image.open('IMG_3160.jpeg').convert('RGBA')
          w,h = img.size; s = min(w,h)
          img = img.crop(((w-s)//2,(h-s)//2,(w+s)//2,(h+s)//2)).resize((156,156), Image.LANCZOS)
          mask = Image.new('L',(156,156),0)
          ImageDraw.Draw(mask).ellipse((0,0,156,156),fill=255)
          img.putalpha(mask)
          raw = img.tobytes()

          compressed = lzfse.compress(raw)
          print('Compressed: %d -> %d bytes' % (len(raw), len(compressed)))

          for mlec_offset, data_offset in [(0x4C2C, 0x4C5C), (0xCB9C, 0xCBCC)]:
              car[mlec_offset+52:mlec_offset+56] = struct.pack('<I', len(raw))
              car[data_offset:data_offset+len(compressed)] = compressed

          with open('Assets.car', 'wb') as f:
              f.write(car)
          print('Done')
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: patched-assets
          path: Assets.car
