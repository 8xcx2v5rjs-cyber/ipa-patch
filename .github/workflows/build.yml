name: Patch Assets
on: [push]
jobs:
  patch:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace ytl_icon
        run: |
          pip3 install Pillow lzfse --break-system-packages --quiet
          python3 << 'EOF'
          import struct, lzfse
          from PIL import Image, ImageDraw

          with open('Assets.car', 'rb') as f:
              car = bytearray(f.read())

          # Место для @2x: 32568 байт, для @3x: 35160 байт
          # Подбираем размер изображения чтобы влезло после сжатия
          # Попробуем 100x100 = 40000 байт raw, сожмётся меньше 32568

          for size, mlec_off, data_off, max_bytes in [
              (100, 0x4C2C, 0x4C5C, 32568),
              (104, 0xCB9C, 0xCBCC, 35160)
          ]:
              img = Image.open('IMG_3160.jpeg').convert('RGBA')
              w,h = img.size; s = min(w,h)
              img = img.crop(((w-s)//2,(h-s)//2,(w+s)//2,(h+s)//2)).resize((size,size), Image.LANCZOS)
              mask = Image.new('L',(size,size),0)
              ImageDraw.Draw(mask).ellipse((0,0,size,size),fill=255)
              img.putalpha(mask)
              raw = img.tobytes()
              compressed = lzfse.compress(raw)
              print('size=%d raw=%d compressed=%d max=%d fits=%s' % (
                  size, len(raw), len(compressed), max_bytes, len(compressed)<=max_bytes))
              if len(compressed) > max_bytes:
                  print('WARNING: does not fit!')
                  continue
              car[mlec_off+40:mlec_off+44] = struct.pack('<I', (size<<16)|size)
              car[mlec_off+52:mlec_off+56] = struct.pack('<I', len(raw))
              car[data_off:data_off+len(compressed)] = compressed
              car[data_off+len(compressed):data_off+max_bytes] = bytes(max_bytes-len(compressed))

          with open('Assets.car', 'wb') as f:
              f.write(car)
          print('Done')
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: patched-assets
          path: Assets.car
